<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mimi & Friends - Book Pages PDF</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #f47920;
      --orange-deep: #d4681a;
      --cream: #fff8f0;
      --sand: #fff1df;
      --ink: #3f342d;
      --muted: #7a6658;
      --card: rgba(255, 255, 255, 0.9);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(244, 121, 32, 0.2), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255, 209, 102, 0.35), transparent 24%),
        linear-gradient(180deg, #fffaf4 0%, var(--cream) 100%);
    }

    main {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 40px;
    }

    .intro {
      background: var(--card);
      border: 1px solid rgba(244, 121, 32, 0.16);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(121, 84, 46, 0.14);
      backdrop-filter: blur(10px);
      margin-bottom: 24px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(244, 121, 32, 0.12);
      color: var(--orange-deep);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Caveat', cursive;
      font-size: clamp(2.6rem, 6vw, 4.5rem);
      line-height: 0.95;
      color: var(--orange);
      margin-bottom: 12px;
    }

    .intro p {
      max-width: 760px;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .pdf-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 246, 235, 0.96));
      border: 1px solid rgba(244, 121, 32, 0.16);
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 20px 55px rgba(121, 84, 46, 0.18);
    }

    .pdf-frame {
      width: 100%;
      height: min(78vh, 1100px);
      border: 0;
      border-radius: 18px;
      background: var(--sand);
      overflow: hidden;
    }

    .pdf-frame object {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
    }

    .fallback {
      min-height: 420px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 32px;
      color: var(--muted);
      background:
        linear-gradient(135deg, rgba(255, 244, 227, 0.92), rgba(255, 252, 246, 0.98));
    }

    .fallback strong {
      display: block;
      font-size: 1.1rem;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .fallback a {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 22px;
      border-radius: 999px;
      background: var(--orange);
      color: #fff;
      font-weight: 800;
      text-decoration: none;
    }

    .fallback a:hover {
      background: var(--orange-deep);
    }

    .note {
      margin-top: 14px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: rgba(63, 52, 45, 0.08);
      padding: 0.15rem 0.35rem;
      border-radius: 6px;
      color: var(--ink);
    }

    @media (max-width: 700px) {
      main {
        width: min(100% - 20px, 1200px);
        padding-top: 20px;
      }

      .intro,
      .pdf-card {
        border-radius: 22px;
      }

      .intro {
        padding: 22px;
      }

      .pdf-card {
        padding: 12px;
      }

      .pdf-frame {
        height: 70vh;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="intro">
      <div class="eyebrow">Private PDF Page</div>
      <h1>Book Pages</h1>
      <p>
        This standalone page displays the book as a PDF and is intentionally not linked from the main site.
        It looks for a file named <code>book-pages.pdf</code> in this same folder.
      </p>
    </section>

    <section class="pdf-card" aria-label="Embedded PDF viewer">
      <div class="pdf-frame">
        <object data="book-pages.pdf" type="application/pdf">
          <div class="fallback">
            <div>
              <strong>The PDF could not be displayed here.</strong>
              <p>
                Add the file <code>book-pages.pdf</code> to this folder, or open it directly using the button below.
              </p>
              <a href="book-pages.pdf" target="_blank" rel="noopener">Open PDF</a>
            </div>
          </div>
        </object>
      </div>
      <p class="note">URL for this page: <code>book-pages.html</code></p>
    </section>
  </main>
</body>
</html>
